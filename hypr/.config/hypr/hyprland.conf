########################################################################################
# Hyprland Night Sky                                                                   #
# Made By Protonsebastian                                                              #
########################################################################################

################
### MONITORS ###
################

monitor = eDP-1, highrr, 0x0, 1

#################
#### PROGRAMS ###
#################

$terminal = kitty
$fileManager = dolphin
$menu = wofi --show drun --height 500

#################
### AUTOSTART ###
#################
exec-once = waybar
exec-once = $terminal
exec-once = hyprpaper
exec-once = swaync
exec-once = hypridle
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = hyprpaper

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = GBM_BACKEND,nvidia-drm

################
### CURSOR ###
################

cursor {
    no_hardware_cursors = true
}

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2

    resize_on_border = true
    allow_tearing = false
    layout = dwindle

    col.active_border = rgb(6495ed) rgb(6495ed) 45deg
    col.inactive_border = rgba(1a0f24aa)
}

decoration {
    rounding = 10

    active_opacity = 1.0
    inactive_opacity = 0.9

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 5
        passes = 4
        vibrancy = 0.1696
    }
}

animations {
    enabled = yes

    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1

    animation = global, 1, 10, default
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, easeOutQuint, popin 80%
    animation = fade, 1, 3.03, default
    animation = workspaces, 1, 3, easeOutQuint, slide
    animation = layers, 1, 3.81, easeOutQuint
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    vfr = true
}

#########
# INPUT #
#########

input {
    kb_layout = us
    follow_mouse = 1

    touchpad {
        natural_scroll = false
        tap-to-click = true
    }
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,
bind = $mainMod, L, exec, hyprlock

# Screenshots
bind = $mainMod, Print, exec, hyprshot -m window
bind = , Print, exec, hyprshot -m output
bind = $mainMod SHIFT, Print, exec, hyprshot -m region

# Lid Switch
bindl = ,switch:on:Lid Switch, exec, hyprlock --immediate

# Navigation
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Media Keys
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Player Controls
bindl = ,XF86AudioNext, exec, playerctl next
bindl = ,XF86AudioPause, exec, playerctl play-pause
bindl = ,XF86AudioPlay, exec, playerctl play-pause
bindl = ,XF86AudioPrev, exec, playerctl previous

# Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

##############################
### WINDOWS AND WORKSPACES ###
##############################

# hyprland-run fixes
windowrule {
    name = pip-style
    match:title = ^(Picture-in-Picture)$
    float = on
    pin = on
    move = 69.5 4
}

# Picture-in-Picture fixes
windowrule {
    name = resolve-noblur
    match:class = ^resolve$
    no_blur = on
}

windowrule {
    name = kill-maximize
    match:class = .*
    suppress_event = maximize
}
windowrule {
    name = hyprland-run-fix
    match:class = ^hyprland-run$
    float = on
    move = 20 80
}
###################
### LAYER RULES ###
###################

layerrule = blur on, match:namespace ^(waybar)$
layerrule = ignore_alpha 0.2, match:namespace ^(waybar)$

layerrule {
    name = swaync_style
    blur = on
    ignore_alpha = 0.5
    match:namespace = swaync
}
layerrule {
    name = no_anim_for_selection
    no_anim = on
    match:namespace = selection
}
layerrule = blur on, match:namespace logout_dialog
##############################
###      WORKSPACE RULES    ###
##############################
workspace = 1, default:true
workspace = 2, rounding:false
